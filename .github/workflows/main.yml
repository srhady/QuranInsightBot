name: Auto Telegram Post

on:
  schedule:
    # গিটহাব UTC সময় মেনে চলে (বাংলাদেশ সময় থেকে ৬ ঘণ্টা বিয়োগ)
    # সকাল ০৯:১৮ BST = 03:18 UTC
    - cron: '18 3 * * *'
    # সন্ধ্যা ০৬:০৭ BST = 12:07 UTC
    - cron: '7 12 * * *'
    # রাত ১০:১১ BST = 16:11 UTC
    - cron: '11 16 * * *'
    
  workflow_dispatch: # এটি আপনাকে ম্যানুয়ালি রান করার অপশন দেবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # যদি রিকোয়ারমেন্ট ফাইল থাকে তবে ইন্সটল হবে
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # অথবা সরাসরি প্রয়োজনীয় লাইব্রেরি এখানে লিখতে পারেন
          # pip install python-telegram-bot google-generativeai 

      - name: Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py
